<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>色彩敏銳度測試</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --text-color: #333;
            --primary-color: #4a90e2;
            --error-color: rgba(255, 0, 0, 0.3);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #game-container {
            width: 90vw;
            max-width: 500px;
            text-align: center;
        }

        /* 頂部資訊列 */
        .status-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 1.2rem;
            font-weight: bold;
        }

        /* 遊戲主畫布 */
        #grid-canvas {
            display: grid;
            gap: 8px;
            background: #fff;
            padding: 10px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            aspect-ratio: 1 / 1;
            width: 100%;
            box-sizing: border-box;
            transition: transform 0.1s;
        }

        .color-block {
            border-radius: 6px;
            cursor: pointer;
            transition: opacity 0.1s;
        }

        .color-block:active {
            opacity: 0.7;
        }

        /* 錯誤閃爍動畫 */
        .wrong-flash {
            background-color: var(--error-color) !important;
            animation: shake 0.3s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* UI 按鈕與覆蓋層 */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        button {
            padding: 12px 30px;
            font-size: 1.2rem;
            border: none;
            border-radius: 25px;
            background: var(--primary-color);
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="status-bar">
            <span>時間: <span id="timer">60</span>s</span>
            <span>分數: <span id="score">0</span></span>
        </div>
        
        <div id="grid-canvas"></div>

        <div style="margin-top: 15px;">
            <button id="pause-btn">暫停遊戲</button>
        </div>
    </div>

    <div id="menu-overlay" class="overlay">
        <h1 id="menu-title">色彩敏銳度測試</h1>
        <p id="menu-info">找出顏色不同的方塊</p>
        <button id="start-btn">開始遊戲</button>
    </div>

    <script>
        /**
         * 遊戲設定與狀態
         */
        const CONFIG = {
            TOTAL_TIME: 60,
            MAX_LEVEL: 70,
            BASE_DIFF: 50, // 初始色差
            MIN_DIFF: 5     // 最小色差
        };

        let state = {
            score: 0,
            timeLeft: CONFIG.TOTAL_TIME,
            isPaused: false,
            isPlaying: false,
            timerId: null
        };

        /**
         * 核心運算模組
         */
        const Core = {
            // 計算當前關卡難度參數
            getLevelData(score) {
                // 決定網格大小 (2x2 到 7x7)
                const gridSize = Math.min(2 + Math.floor(score / 10), 7);
                
                // 線性計算色差值 (線性遞減公式)
                const diff = Math.max(
                    CONFIG.BASE_DIFF - (score * (CONFIG.BASE_DIFF - CONFIG.MIN_DIFF) / CONFIG.MAX_LEVEL),
                    CONFIG.MIN_DIFF
                );

                // 生成隨機基礎色
                const r = Math.floor(Math.random() * 200);
                const g = Math.floor(Math.random() * 200);
                const b = Math.floor(Math.random() * 200);
                
                return {
                    gridSize,
                    baseColor: `rgb(${r}, ${g}, ${b})`,
                    targetColor: `rgb(${r + diff}, ${g + diff}, ${b + diff})`,
                    targetIndex: Math.floor(Math.random() * (gridSize * gridSize))
                };
            }
        };

        /**
         * UI 渲染模組
         */
        const UI = {
            elements: {
                grid: document.getElementById('grid-canvas'),
                timer: document.getElementById('timer'),
                score: document.getElementById('score'),
                overlay: document.getElementById('menu-overlay'),
                title: document.getElementById('menu-title'),
                startBtn: document.getElementById('start-btn')
            },

            renderGrid(levelData, onSelect) {
                const { gridSize, baseColor, targetColor, targetIndex } = levelData;
                this.elements.grid.innerHTML = '';
                this.elements.grid.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;

                for (let i = 0; i < gridSize * gridSize; i++) {
                    const block = document.createElement('div');
                    block.className = 'color-block';
                    block.style.backgroundColor = (i === targetIndex) ? targetColor : baseColor;
                    block.onclick = () => onSelect(i === targetIndex);
                    this.elements.grid.appendChild(block);
                }
            },

            updateStatus(time, score) {
                this.elements.timer.textContent = time;
                this.elements.score.textContent = score;
            },

            flashError() {
                this.elements.grid.classList.add('wrong-flash');
                setTimeout(() => this.elements.grid.classList.remove('wrong-flash'), 300);
            },

            toggleOverlay(show, title = '', btnText = '') {
                this.elements.overlay.classList.toggle('hidden', !show);
                if (title) this.elements.title.textContent = title;
                if (btnText) this.elements.startBtn.textContent = btnText;
            }
        };

        /**
         * 遊戲控制邏輯
         */
        const Game = {
            init() {
                UI.elements.startBtn.onclick = () => this.start();
                document.getElementById('pause-btn').onclick = () => this.pause();
                this.reset();
            },

            reset() {
                state.score = 0;
                state.timeLeft = CONFIG.TOTAL_TIME;
                state.isPaused = false;
                state.isPlaying = false;
                clearInterval(state.timerId);
                UI.updateStatus(state.timeLeft, state.score);
            },

            start() {
                if (state.isPaused) {
                    state.isPaused = false;
                } else {
                    this.reset();
                    state.isPlaying = true;
                    this.nextLevel();
                }
                UI.toggleOverlay(false);
                this.startTimer();
            },

            pause() {
                if (!state.isPlaying) return;
                state.isPaused = true;
                clearInterval(state.timerId);
                UI.toggleOverlay(true, '遊戲暫停', '繼續遊戲');
            },

            startTimer() {
                state.timerId = setInterval(() => {
                    state.timeLeft--;
                    UI.updateStatus(state.timeLeft, state.score);
                    if (state.timeLeft <= 0) this.end();
                }, 1000);
            },

            nextLevel() {
                const data = Core.getLevelData(state.score);
                UI.renderGrid(data, (isCorrect) => {
                    if (isCorrect) {
                        state.score++;
                        UI.updateStatus(state.timeLeft, state.score);
                        this.nextLevel();
                    } else {
                        UI.flashError();
                    }
                });
            },

            end() {
                state.isPlaying = false;
                clearInterval(state.timerId);
                UI.toggleOverlay(true, `遊戲結束！得分：${state.score}`, '再玩一次');
            }
        };

        // 啟動初始化
        Game.init();
    </script>
</body>
</html>
